services:
  # ── Frontend (React SPA) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - parfum-network

  # ── Backend (Express API) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Uncomment to expose backend directly (for debugging)
    # ports:
    #   - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/parfum
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}
      - CLIENT_URL=http://localhost
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - parfum-network

  # ── MongoDB ──
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - parfum-network

volumes:
  mongodb-data:
    driver: local

networks:
  parfum-network:
    driver: bridge

# ──────────────────────────────────────────────
# Pour le mode développement, utilisez :
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# ──────────────────────────────────────────────

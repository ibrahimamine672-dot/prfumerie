<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5b7"/>
      <stop offset="40%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.15)"/>
      <stop offset="100%" stop-color="rgba(212,175,55,0.05)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="#0d0d0d" rx="56"/>
  
  <!-- Bottle body -->
  <path d="M 176 320 L 176 400 Q 176 430 196 440 L 316 440 Q 336 430 336 400 L 336 320 Z" fill="url(#glass)" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
  
  <!-- Bottle neck -->
  <path d="M 210 250 L 210 320 L 302 320 L 302 250" fill="url(#glass)" stroke="url(#gold)" stroke-width="10" stroke-linejoin="round"/>
  
  <!-- Bottle shoulder curves -->
  <path d="M 176 320 Q 176 290 210 280" stroke="url(#gold)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 336 320 Q 336 290 302 280" stroke="url(#gold)" stroke-width="10" fill="none" stroke-linecap="round"/>
  
  <!-- Stopper -->
  <rect x="226" y="180" width="60" height="70" rx="8" fill="url(#gold)" stroke="url(#gold)" stroke-width="4"/>
  <rect x="218" y="165" width="76" height="24" rx="10" fill="url(#gold)"/>
  
  <!-- Gold band on bottle -->
  <rect x="176" y="370" width="160" height="8" rx="4" fill="url(#gold)"/>
  
  <!-- Label accent -->
  <rect x="216" y="332" width="80" height="30" rx="4" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <line x1="226" y1="347" x2="286" y2="347" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Glass shine -->
  <path d="M 230 330 L 230 400" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-linecap="round"/>

  <!-- Scent trail -->
  <path d="M 256 170 Q 230 145 256 120 Q 282 95 256 70" stroke="url(#gold)" stroke-width="5" fill="none" stroke-linecap="round" stroke-opacity="0.6"/>
  <circle cx="220" cy="130" r="4" fill="url(#gold)" opacity="0.4"/>
  <circle cx="290" cy="105" r="3" fill="url(#gold)" opacity="0.3"/>
  <circle cx="245" cy="90" r="2.5" fill="url(#gold)" opacity="0.2"/>
</svg>
